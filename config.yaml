# config.yaml — Tesla Engine Sound Bridge
# ----------------------------------------
# Edit this file to match your hardware and engine-sim setup.
# All values are optional; feeder.py DEFAULT_CONFIG provides fallbacks.

# ── CAN interface ─────────────────────────────────────────────────────────────
can:
  # Interface type — pick the one matching your CAN adapter:
  #
  #   slcan      Serial CAN adapter (CANable 1.x / slcan firmware)
  #              macOS:   /dev/tty.usbmodem*  or  /dev/cu.usbserial*
  #              Linux:   /dev/ttyUSB0  or  /dev/ttyACM0
  #              Windows: COM3 (or whichever COM port Windows assigns)
  #
  #   gs_usb     Geschwister-Schneider USB CAN (CANable 2.0 / candleLight
  #              firmware).  No extra driver needed on macOS or Linux.
  #              channel: 0  (integer index, not a device path)
  #
  #   socketcan  Linux / Raspberry Pi kernel CAN.  NOT available on macOS.
  #              channel: can0  (bring up with: ip link set can0 up type can bitrate 500000)
  #
  #   pcan       PEAK PCAN-USB.  Requires PEAK driver (macOS driver available
  #              from peak-system.com).  channel: PCAN_USBBUS1
  #
  #   kvaser     Kvaser hardware + driver.  channel: 0
  #
  #   virtual    python-can virtual bus — no hardware, for development/CI
  #              channel: ""
  interface: slcan

  # Channel — depends on interface type (see above).
  # Find your macOS serial port with:  ls /dev/tty.usb* /dev/cu.usb*
  # Common macOS values:
  #   /dev/tty.usbmodem0    (USB CDC — CANable, etc.)
  #   /dev/cu.usbserial-0   (FTDI-based adapters)
  channel: /dev/tty.usbmodem0

  bitrate: 500000          # 500 kbps — standard Tesla CAN

  # Path to the DBC file.  Relative paths are resolved from the project root.
  # Copy Model3CAN.dbc into this folder, or supply an absolute path.
  dbc_path: Model3CAN.dbc

# ── Signal mapping ────────────────────────────────────────────────────────────
# Maps roles to DBC signal names.  Change only if your DBC uses different names.
signal_map:
  vehicle_speed:  DI_vehicleSpeed     # kph  (message 0x257 / ID 599)
  throttle_pedal: DI_accelPedalPos    # 0-100 %  (message 0x118 / ID 280)
  brake_pedal:    DI_brakePedalState  # enum OFF/ON  (message 0x118 / ID 280)
  gear:           DI_gear             # enum P/R/N/D  (message 0x118 / ID 280)

# Optional: continuous-valued brake pedal travel (overrides brake_pedal boolean).
# Uncomment and calibrate max_mm to your vehicle's brake travel range.
# analog_brake:
#   signal:  IBST_sInputRodDriver    # 0–47 mm  (message 0x39D / ID 925)
#   max_mm:  20.0                    # mm at which brake = 1.0

# ── engine-sim-headless settings ─────────────────────────────────────────────
engine_sim:
  # Path to the compiled engine-sim-headless binary.
  # macOS / Linux: build/engine-sim-headless    (no extension)
  # Windows:       build/engine-sim-headless.exe
  executable: build/engine-sim-headless

  # Default engine script shown in the launcher (relative to assets/engines/)
  engine_script: atg-video-2/03_2jz.mr

  port: 9999                  # UDP port engine-sim-headless listens on

  startup_mode: hybrid        # hybrid (virtual gears) | throttle (raw pedal)
  virtual_gears: true         # send "virtual_gears on" at startup

# ── Feeder settings ───────────────────────────────────────────────────────────
feeder:
  update_hz: 20.0             # how often to send UDP control to engine-sim (Hz)
  can_timeout_sec: 2.0        # seconds without CAN data before failsafe (pedal -> 0)
  manual_test: false          # set true to use generated data instead of CAN
  log_level: INFO             # DEBUG | INFO | WARNING | ERROR

# ── Manual test mode ──────────────────────────────────────────────────────────
# Used when feeder.manual_test = true  or  --manual-test flag on CLI.
manual_test:
  mode: ramp          # ramp (0->100 mph cycle) | sine (smooth oscillation) | hold
  speed_mph: 60.0     # hold mode: fixed speed
  pedal_pct: 40.0     # hold mode: fixed pedal %
  brake: 0.0          # hold mode: fixed brake
